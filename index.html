<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#060606" />
  <title>GymLog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; width: 100%; background: #060606; overflow: hidden; }
    body { font-family: 'Syne', sans-serif; -webkit-tap-highlight-color: transparent; }
    input, button, textarea, select { outline: none; -webkit-appearance: none; }
    input[type=range] { -webkit-appearance: none; height: 4px; background: #2a2a2a; border-radius: 2px; cursor: pointer; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #C8FF00; cursor: pointer; }
    ::-webkit-scrollbar { width: 0; height: 0; }
    * { scrollbar-width: none; }
  </style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── Users ─────────────────────────────────────────────────────────────────
const USERS = [
  { id: "ramon", name: "Ramón", emoji: "⚡", pin: "1234", accent: "#C8FF00" },
  { id: "novia", name: "Mi Amor", emoji: "💜", pin: "5678", accent: "#FF6DD4" },
];

// ── Helpers ───────────────────────────────────────────────────────────────
const uid = () => Math.random().toString(36).slice(2, 8);
const today = () => new Date().toISOString().slice(0, 10);
const fmtDate = (iso) => {
  const d = new Date(iso + "T12:00:00");
  return d.toLocaleDateString("es-MX", { weekday: "short", day: "numeric", month: "short" });
};

// ── Data ──────────────────────────────────────────────────────────────────
const SEED = {
  ramon: {
    routines: [
      { id: "r1", name: "Espalda", muscles: "Espalda", restTimer: 90, exercises: [
        { id: "e1", name: "Jalón al pecho", sets: 4, reps: "10-12", weight: 60 },
        { id: "e2", name: "Remo con barra", sets: 4, reps: "8-10", weight: 80 },
        { id: "e3", name: "Facepull", sets: 3, reps: "15", weight: 25 },
      ]},
      { id: "r2", name: "Bíceps", muscles: "Bíceps", restTimer: 60, exercises: [
        { id: "e4", name: "Curl con barra", sets: 3, reps: "10-12", weight: 30 },
        { id: "e5", name: "Curl martillo", sets: 3, reps: "12", weight: 14 },
      ]},
      { id: "r3", name: "Pierna", muscles: "Cuádriceps · Isquiotibiales", restTimer: 120, exercises: [
        { id: "e6", name: "Sentadilla", sets: 4, reps: "8-10", weight: 100 },
        { id: "e7", name: "Prensa", sets: 3, reps: "12", weight: 140 },
        { id: "e8", name: "Extensión", sets: 3, reps: "15", weight: 50 },
      ]},
    ],
    history: [],
  },
  novia: { routines: [], history: [] },
};

function loadData() {
  try { const d = localStorage.getItem("gl2"); return d ? JSON.parse(d) : SEED; }
  catch { return SEED; }
}
function saveData(d) { try { localStorage.setItem("gl2", JSON.stringify(d)); } catch {} }

// ── Shared styles ──────────────────────────────────────────────────────────
const scr = { display: "flex", flexDirection: "column", height: "100%", overflow: "hidden" };
const h2s = { color: "#fff", fontSize: 22, fontWeight: 800, margin: 0, fontFamily: "Syne", letterSpacing: -0.5 };
const labelS = { color: "#444", fontSize: 10, letterSpacing: 2, margin: "0 0 6px", fontFamily: "Syne" };
const backBtn = { background: "none", border: "none", color: "#555", cursor: "pointer", fontSize: 22, padding: 0, fontFamily: "Syne" };
const iStyle = { width: "100%", background: "#1a1a1a", border: "1px solid #2a2a2a", borderRadius: 10, padding: "11px", color: "#fff", fontSize: 16, fontFamily: "JetBrains Mono, monospace", textAlign: "center", boxSizing: "border-box" };

// ═══════════════════════════════════════════════════════
// REST TIMER
// ═══════════════════════════════════════════════════════
function RestTimer({ initial, onClose }) {
  const [total, setTotal] = useState(initial);
  const [rem, setRem] = useState(initial);
  const [running, setRunning] = useState(true);
  const ref = useRef();

  useEffect(() => {
    if (running && rem > 0) { ref.current = setTimeout(() => setRem(r => r - 1), 1000); }
    return () => clearTimeout(ref.current);
  }, [running, rem]);

  useEffect(() => { if (rem === 0 && navigator.vibrate) navigator.vibrate([200, 100, 200]); }, [rem]);

  const pct = total > 0 ? (rem / total) * 100 : 0;
  const R = 70, circ = 2 * Math.PI * R;
  const mins = String(Math.floor(rem / 60)).padStart(2, "0");
  const secs = String(rem % 60).padStart(2, "0");

  function adjust(delta) {
    const nt = Math.max(10, total + delta);
    setTotal(nt);
    setRem(r => Math.min(Math.max(r + delta, 0), nt));
  }

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(4,4,4,0.95)", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", zIndex: 9999, gap: 24 }}>
      <p style={{ color: "#555", fontSize: 11, letterSpacing: 4, textTransform: "uppercase", margin: 0 }}>Descanso</p>
      <div style={{ position: "relative", width: 180, height: 180 }}>
        <svg width={180} height={180} style={{ position: "absolute", transform: "rotate(-90deg)" }}>
          <circle cx={90} cy={90} r={R} fill="none" stroke="#1a1a1a" strokeWidth={6} />
          <circle cx={90} cy={90} r={R} fill="none" stroke={rem === 0 ? "#3aff8a" : "#C8FF00"} strokeWidth={6}
            strokeDasharray={circ} strokeDashoffset={circ * (1 - pct / 100)}
            style={{ transition: "stroke-dashoffset 1s linear, stroke 0.3s" }} />
        </svg>
        <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
          <span style={{ fontFamily: "JetBrains Mono, monospace", fontSize: 44, fontWeight: 500, color: rem === 0 ? "#3aff8a" : "#fff", lineHeight: 1 }}>{mins}:{secs}</span>
          {rem === 0 && <span style={{ fontSize: 10, color: "#3aff8a", letterSpacing: 3, marginTop: 6 }}>¡LISTO!</span>}
        </div>
      </div>
      <div style={{ display: "flex", gap: 8 }}>
        {[-30, -15, +15, +30].map(d => (
          <button key={d} onClick={() => adjust(d)} style={{ background: "#1a1a1a", border: "1px solid #2a2a2a", borderRadius: 8, color: d > 0 ? "#C8FF00" : "#ff6464", fontFamily: "JetBrains Mono, monospace", fontSize: 12, padding: "7px 10px", cursor: "pointer" }}>
            {d > 0 ? "+" : ""}{d}s
          </button>
        ))}
      </div>
      <div style={{ display: "flex", gap: 10 }}>
        <button onClick={() => { setRem(total); setRunning(true); }} style={{ background: "#1e1e1e", color: "#888", border: "none", borderRadius: 10, padding: "10px 18px", fontSize: 13, cursor: "pointer", fontFamily: "Syne" }}>↺ Reset</button>
        <button onClick={() => setRunning(r => !r)} style={{ background: "#1e1e1e", color: "#fff", border: "none", borderRadius: 10, padding: "10px 18px", fontSize: 13, cursor: "pointer", fontFamily: "Syne" }}>{running ? "⏸" : "▶"}</button>
        <button onClick={onClose} style={{ background: "#C8FF00", color: "#000", border: "none", borderRadius: 10, padding: "10px 18px", fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: "Syne" }}>Cerrar</button>
      </div>
      <p style={{ color: "#2a2a2a", fontSize: 11 }}>{total}s configurados</p>
    </div>
  );
}

// ═══════════════════════════════════════════════════════
// WEIGHT HISTORY MODAL
// ═══════════════════════════════════════════════════════
function WeightHistory({ exName, exId, history, onClose }) {
  const logs = history
    .flatMap(s => (s.entries || []).filter(e => e.exId === exId).map(e => ({ date: s.date, weight: e.weight, sets: e.sets, reps: e.reps })))
    .sort((a, b) => b.date.localeCompare(a.date)).slice(0, 10);
  const max = logs.length ? Math.max(...logs.map(l => parseFloat(l.weight) || 0)) : 0;

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.9)", zIndex: 9999, display: "flex", alignItems: "flex-end" }}>
      <div style={{ background: "#0e0e0e", width: "100%", maxHeight: "80vh", borderRadius: "20px 20px 0 0", overflow: "hidden", display: "flex", flexDirection: "column" }}>
        <div style={{ padding: "20px 20px 14px", borderBottom: "1px solid #1a1a1a", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div>
            <p style={{ margin: 0, fontSize: 10, color: "#555", letterSpacing: 3, textTransform: "uppercase" }}>Historial de peso</p>
            <p style={{ margin: "2px 0 0", fontSize: 17, fontWeight: 700, color: "#fff" }}>{exName}</p>
          </div>
          <button onClick={onClose} style={{ background: "#1a1a1a", border: "none", borderRadius: "50%", width: 32, height: 32, color: "#888", cursor: "pointer", fontSize: 16 }}>✕</button>
        </div>
        <div style={{ overflowY: "auto", padding: "16px 20px", flex: 1 }}>
          {logs.length === 0
            ? <p style={{ color: "#444", fontSize: 14, textAlign: "center", padding: "32px 0" }}>Sin registros todavía.</p>
            : logs.map((l, i) => {
              const bar = max > 0 ? ((parseFloat(l.weight) || 0) / max) * 100 : 0;
              return (
                <div key={i} style={{ marginBottom: 14 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                    <span style={{ color: "#aaa", fontSize: 12 }}>{fmtDate(l.date)}</span>
                    <span style={{ color: "#fff", fontSize: 13, fontFamily: "JetBrains Mono, monospace" }}>{l.weight}kg · {l.sets}×{l.reps}</span>
                  </div>
                  <div style={{ height: 4, background: "#1a1a1a", borderRadius: 2 }}>
                    <div style={{ height: "100%", width: bar + "%", background: "#C8FF00", borderRadius: 2, transition: "width .4s" }} />
                  </div>
                </div>
              );
          })}
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════
// LOGIN
// ═══════════════════════════════════════════════════════
function Login({ onLogin }) {
  const [who, setWho] = useState(null);
  const [pin, setPin] = useState("");
  const [err, setErr] = useState(false);

  function tap(k) {
    if (k === "⌫") { setPin(p => p.slice(0, -1)); setErr(false); return; }
    if (pin.length >= 4) return;
    const np = pin + k;
    setPin(np);
    if (np.length === 4) {
      const u = USERS.find(u => u.id === who);
      if (np === u.pin) { setTimeout(() => onLogin(u), 150); }
      else { setTimeout(() => { setErr(true); setPin(""); }, 200); }
    }
  }

  return (
    <div style={{ minHeight: "100vh", background: "#060606", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 24 }}>
      <div style={{ marginBottom: 48, textAlign: "center" }}>
        <div style={{ fontSize: 48, marginBottom: 12 }}>🏋️</div>
        <h1 style={{ color: "#fff", fontSize: 32, fontWeight: 800, letterSpacing: -1.5 }}>GymLog</h1>
        <p style={{ color: "#444", fontSize: 12, marginTop: 8, letterSpacing: 2 }}>REGISTRA TU PROGRESO</p>
      </div>
      {!who ? (
        <div style={{ display: "flex", flexDirection: "column", gap: 12, width: "100%", maxWidth: 320 }}>
          {USERS.map(u => (
            <button key={u.id} onClick={() => { setWho(u.id); setPin(""); setErr(false); }} style={{
              background: "#0e0e0e", border: "1.5px solid #1e1e1e", borderRadius: 16,
              padding: "20px 24px", color: "#fff", cursor: "pointer", fontFamily: "Syne, sans-serif",
              display: "flex", alignItems: "center", gap: 16, transition: "border-color .2s", width: "100%",
            }}
              onMouseOver={e => e.currentTarget.style.borderColor = u.accent}
              onMouseOut={e => e.currentTarget.style.borderColor = "#1e1e1e"}
            >
              <div style={{ width: 44, height: 44, borderRadius: "50%", background: u.accent + "22", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22, flexShrink: 0 }}>{u.emoji}</div>
              <div style={{ textAlign: "left" }}>
                <div style={{ fontWeight: 700, fontSize: 16, color: "#fff" }}>{u.name}</div>
                <div style={{ fontSize: 11, color: "#555", marginTop: 2, letterSpacing: 1 }}>INGRESAR</div>
              </div>
              <div style={{ marginLeft: "auto", color: "#333", fontSize: 18 }}>→</div>
            </button>
          ))}
        </div>
      ) : (
        <div style={{ width: "100%", maxWidth: 300 }}>
          <button onClick={() => setWho(null)} style={{ background: "none", border: "none", color: "#555", cursor: "pointer", fontFamily: "Syne", marginBottom: 24, fontSize: 13 }}>← Volver</button>
          <div style={{ display: "flex", justifyContent: "center", gap: 14, marginBottom: 28 }}>
            {[0,1,2,3].map(i => (
              <div key={i} style={{ width: 14, height: 14, borderRadius: "50%", background: pin.length > i ? (err ? "#ff4444" : USERS.find(u => u.id === who)?.accent) : "#222", transition: "background .15s" }} />
            ))}
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 10 }}>
            {["1","2","3","4","5","6","7","8","9","","0","⌫"].map((k, i) => (
              <button key={i} onClick={() => k && tap(k)} style={{
                background: k ? "#111" : "transparent", border: k ? "1px solid #1e1e1e" : "none",
                borderRadius: 12, padding: "18px 0", fontSize: k === "⌫" ? 20 : 22,
                fontWeight: 600, color: "#fff", cursor: k ? "pointer" : "default", fontFamily: "JetBrains Mono, monospace",
              }}>{k}</button>
            ))}
          </div>
          {err && <p style={{ color: "#ff4444", textAlign: "center", fontSize: 12, marginTop: 16 }}>PIN incorrecto</p>}
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════
// EXERCISE EDIT MODAL
// ═══════════════════════════════════════════════════════
function ExModal({ ex, restTimer, onSave, onClose }) {
  const [sets, setSets] = useState(String(ex.sets));
  const [reps, setReps] = useState(String(ex.reps));
  const [weight, setWeight] = useState(String(ex.weight));
  const [timer, setTimer] = useState(restTimer);

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.9)", zIndex: 9000, display: "flex", alignItems: "flex-end" }}>
      <div style={{ background: "#0e0e0e", width: "100%", borderRadius: "20px 20px 0 0", padding: "24px 20px 40px" }}>
        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 20 }}>
          <p style={{ color: "#fff", fontWeight: 700, fontSize: 17, margin: 0 }}>{ex.name}</p>
          <button onClick={onClose} style={{ background: "none", border: "none", color: "#666", cursor: "pointer", fontSize: 20 }}>✕</button>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, marginBottom: 16 }}>
          {[["Series", sets, setSets], ["Reps", reps, setReps], ["Peso (kg)", weight, setWeight]].map(([l, v, sv]) => (
            <div key={l}>
              <p style={{ ...labelS, marginBottom: 6 }}>{l.toUpperCase()}</p>
              <input value={v} onChange={e => sv(e.target.value)} style={iStyle} />
            </div>
          ))}
        </div>
        <div style={{ marginBottom: 20 }}>
          <p style={{ ...labelS, marginBottom: 8 }}>DESCANSO (SEGUNDOS)</p>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <input type="range" min={10} max={300} step={5} value={timer} onChange={e => setTimer(+e.target.value)} style={{ flex: 1, accentColor: "#C8FF00" }} />
            <span style={{ color: "#C8FF00", fontSize: 14, fontFamily: "JetBrains Mono", minWidth: 40, textAlign: "right" }}>{timer}s</span>
          </div>
          <div style={{ display: "flex", gap: 6, marginTop: 10, flexWrap: "wrap" }}>
            {[30, 45, 60, 90, 120, 180].map(s => (
              <button key={s} onClick={() => setTimer(s)} style={{
                background: timer === s ? "#C8FF00" : "#1a1a1a", color: timer === s ? "#000" : "#777",
                border: "none", borderRadius: 6, padding: "5px 10px", fontSize: 11, cursor: "pointer", fontFamily: "JetBrains Mono, monospace", fontWeight: 600,
              }}>{s}s</button>
            ))}
          </div>
        </div>
        <button onClick={() => onSave({ sets, reps, weight, restTimer: timer })} style={{ width: "100%", background: "#C8FF00", color: "#000", border: "none", borderRadius: 12, padding: "15px", fontSize: 15, fontWeight: 700, cursor: "pointer", fontFamily: "Syne" }}>
          Guardar
        </button>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════
// ROUTINE EDITOR
// ═══════════════════════════════════════════════════════
function RoutineEditor({ existing, onSave, onBack, accent }) {
  const [name, setName] = useState(existing?.name || "");
  const [muscles, setMuscles] = useState(existing?.muscles || "");
  const [rest, setRest] = useState(existing?.restTimer || 90);
  const [exs, setExs] = useState(existing?.exercises || []);

  function addEx() { setExs(p => [...p, { id: uid(), name: "", sets: 3, reps: "10-12", weight: 0 }]); }
  function upEx(id, f, v) { setExs(p => p.map(e => e.id === id ? { ...e, [f]: v } : e)); }
  function rmEx(id) { setExs(p => p.filter(e => e.id !== id)); }

  return (
    <div style={scr}>
      <div style={{ padding: "20px 20px 0", display: "flex", gap: 12, alignItems: "center" }}>
        <button onClick={onBack} style={backBtn}>←</button>
        <h2 style={h2s}>{existing ? "Editar rutina" : "Nueva rutina"}</h2>
      </div>
      <div style={{ flex: 1, overflowY: "auto", padding: "20px" }}>
        {[["Nombre", name, setName, "Ej. Espalda"], ["Músculo(s)", muscles, setMuscles, "Ej. Espalda · Bíceps"]].map(([l, v, sv, ph]) => (
          <div key={l} style={{ marginBottom: 16 }}>
            <p style={labelS}>{l.toUpperCase()}</p>
            <input value={v} onChange={e => sv(e.target.value)} placeholder={ph} style={{ ...iStyle, textAlign: "left", padding: "12px 14px" }} />
          </div>
        ))}
        <div style={{ marginBottom: 24 }}>
          <p style={labelS}>DESCANSO POR DEFECTO</p>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
            <input type="range" min={10} max={300} step={5} value={rest} onChange={e => setRest(+e.target.value)} style={{ flex: 1, accentColor: accent }} />
            <span style={{ color: accent, fontSize: 14, fontFamily: "JetBrains Mono", minWidth: 40, textAlign: "right" }}>{rest}s</span>
          </div>
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
            {[30, 60, 90, 120, 180].map(s => (
              <button key={s} onClick={() => setRest(s)} style={{ background: rest === s ? accent : "#1a1a1a", color: rest === s ? "#000" : "#666", border: "none", borderRadius: 6, padding: "5px 10px", fontSize: 11, cursor: "pointer", fontFamily: "JetBrains Mono, monospace", fontWeight: 600 }}>{s}s</button>
            ))}
          </div>
        </div>
        <div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
            <p style={{ ...labelS, margin: 0 }}>EJERCICIOS</p>
            <button onClick={addEx} style={{ background: accent + "22", color: accent, border: "1px solid " + accent + "44", borderRadius: 8, padding: "6px 14px", fontSize: 12, cursor: "pointer", fontFamily: "Syne" }}>+ Agregar</button>
          </div>
          {exs.map((ex, idx) => (
            <div key={ex.id} style={{ background: "#0e0e0e", border: "1px solid #1e1e1e", borderRadius: 14, padding: 14, marginBottom: 10 }}>
              <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 10 }}>
                <span style={{ color: "#333", fontSize: 12, fontFamily: "JetBrains Mono", flexShrink: 0 }}>{String(idx + 1).padStart(2, "0")}</span>
                <input value={ex.name} onChange={e => upEx(ex.id, "name", e.target.value)} placeholder="Nombre del ejercicio"
                  style={{ ...iStyle, textAlign: "left", padding: "10px 12px", flex: 1 }} />
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
                {[["Series", "sets"], ["Reps", "reps"], ["Peso kg", "weight"]].map(([l, f]) => (
                  <div key={f}>
                    <p style={{ color: "#444", fontSize: 9, letterSpacing: 1.5, margin: "0 0 4px" }}>{l.toUpperCase()}</p>
                    <input value={ex[f]} onChange={e => upEx(ex.id, f, e.target.value)} style={{ ...iStyle, padding: "8px 6px" }} />
                  </div>
                ))}
              </div>
              <button onClick={() => rmEx(ex.id)} style={{ background: "none", border: "none", color: "#ff5555", fontSize: 11, marginTop: 10, cursor: "pointer", fontFamily: "Syne" }}>Eliminar</button>
            </div>
          ))}
        </div>
        <div style={{ height: 100 }} />
      </div>
      <div style={{ padding: "14px 20px", borderTop: "1px solid #111" }}>
        <button onClick={() => name.trim() && onSave({ name: name.trim(), muscles, restTimer: rest, exercises: exs })}
          style={{ width: "100%", background: name.trim() ? accent : "#1a1a1a", color: name.trim() ? "#000" : "#444", border: "none", borderRadius: 12, padding: 15, fontSize: 15, fontWeight: 700, cursor: "pointer", fontFamily: "Syne" }}>
          {existing ? "Guardar cambios" : "Crear rutina"}
        </button>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════
// SESSION
// ═══════════════════════════════════════════════════════
function Session({ routines, user, ud, onFinish, onCancel }) {
  const buildExs = () => routines.flatMap(r =>
    r.exercises.map(e => ({ ...e, routineId: r.id, routineName: r.name, routineRest: r.restTimer, done: false, customRest: null }))
  );
  const [exs, setExs] = useState(buildExs);
  const [editIdx, setEditIdx] = useState(null);
  const [timerSecs, setTimerSecs] = useState(null);
  const [histModal, setHistModal] = useState(null);
  const [note, setNote] = useState("");

  function upEx(idx, patch) { setExs(p => p.map((e, i) => i === idx ? { ...e, ...patch } : e)); }
  function getTimer(ex) { return ex.customRest != null ? ex.customRest : ex.routineRest; }

  function finish() {
    const entries = exs.map(e => ({ exId: e.id, routineId: e.routineId, sets: e.sets, reps: e.reps, weight: e.weight }));
    const session = { id: uid(), date: today(), label: routines.map(r => r.name).join(" + "), note, entries };
    const newRoutines = ud.routines.map(r => {
      const upd = exs.filter(e => e.routineId === r.id);
      if (!upd.length) return r;
      return { ...r, exercises: r.exercises.map(ex => { const u = upd.find(e => e.id === ex.id); return u ? { ...ex, sets: parseInt(u.sets) || ex.sets, reps: u.reps, weight: parseFloat(u.weight) || ex.weight } : ex; }) };
    });
    onFinish({ newRoutines, session });
  }

  const done = exs.filter(e => e.done).length;

  return (
    <div style={scr}>
      <div style={{ padding: "18px 20px 0" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 4 }}>
          <button onClick={onCancel} style={backBtn}>←</button>
          <div style={{ flex: 1 }}>
            <h2 style={{ ...h2s, fontSize: 18 }}>{routines.map(r => r.name).join(" + ")}</h2>
            <p style={{ color: "#555", fontSize: 11, margin: 0, fontFamily: "JetBrains Mono" }}>{fmtDate(today())}</p>
          </div>
          <span style={{ color: "#555", fontSize: 12, fontFamily: "JetBrains Mono" }}>{done}/{exs.length}</span>
        </div>
        <div style={{ height: 3, background: "#1a1a1a", borderRadius: 2, marginTop: 12 }}>
          <div style={{ height: "100%", width: (exs.length ? (done / exs.length) * 100 : 0) + "%", background: user.accent, borderRadius: 2, transition: "width .4s" }} />
        </div>
      </div>
      <div style={{ flex: 1, overflowY: "auto", padding: "16px 20px" }}>
        {routines.map(r => (
          <div key={r.id} style={{ marginBottom: 28 }}>
            <p style={{ ...labelS, color: user.accent, marginBottom: 12 }}>{r.name.toUpperCase()}</p>
            {exs.map((ex, idx) => ex.routineId !== r.id ? null : (
              <div key={ex.id} style={{ background: ex.done ? "#0c160c" : "#0e0e0e", border: "1px solid " + (ex.done ? "#2a4a2a" : "#1e1e1e"), borderRadius: 14, padding: "14px 16px", marginBottom: 10, transition: "all .2s" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
                  <div>
                    <p style={{ color: ex.done ? "#5aaa3a" : "#fff", fontWeight: 700, fontSize: 15, margin: 0 }}>{ex.name}</p>
                    <span style={{ color: "#555", fontSize: 11, fontFamily: "JetBrains Mono" }}>{ex.sets} series · {ex.reps} reps · {ex.weight}kg</span>
                  </div>
                  <button onClick={() => setEditIdx(idx)} style={{ background: "#1a1a1a", border: "none", borderRadius: 8, color: "#888", fontSize: 11, padding: "5px 10px", cursor: "pointer", fontFamily: "Syne", flexShrink: 0 }}>Editar</button>
                </div>
                <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                  <button onClick={() => upEx(idx, { done: !ex.done })} style={{ flex: 1, background: ex.done ? "#1e3a1e" : "#1a1a1a", border: "1px solid " + (ex.done ? "#3a6a3a" : "#2a2a2a"), borderRadius: 8, color: ex.done ? "#5aaa3a" : "#888", fontSize: 12, padding: "9px 0", cursor: "pointer", fontFamily: "Syne", fontWeight: 600 }}>
                    {ex.done ? "✓ Completado" : "Marcar listo"}
                  </button>
                  {ex.done && (
                    <button onClick={() => setTimerSecs(getTimer(ex))} style={{ background: user.accent + "15", border: "1px solid " + user.accent + "44", borderRadius: 8, color: user.accent, fontSize: 12, padding: "9px 14px", cursor: "pointer", fontFamily: "Syne", fontWeight: 600 }}>⏱ {getTimer(ex)}s</button>
                  )}
                  <button onClick={() => setHistModal({ exId: ex.id, exName: ex.name })} style={{ background: "#1a1a1a", border: "1px solid #2a2a2a", borderRadius: 8, color: "#555", fontSize: 12, padding: "9px 12px", cursor: "pointer" }}>📊</button>
                </div>
              </div>
            ))}
          </div>
        ))}
        <div style={{ marginBottom: 16 }}>
          <p style={labelS}>NOTA (opcional)</p>
          <textarea value={note} onChange={e => setNote(e.target.value)} rows={3} placeholder="Cómo te sentiste, qué mejorar..."
            style={{ ...iStyle, textAlign: "left", padding: "12px", resize: "none", width: "100%" }} />
        </div>
        <div style={{ height: 90 }} />
      </div>
      <div style={{ padding: "12px 20px", borderTop: "1px solid #111" }}>
        <button onClick={finish} style={{ width: "100%", background: user.accent, color: "#000", border: "none", borderRadius: 12, padding: 15, fontSize: 15, fontWeight: 700, cursor: "pointer", fontFamily: "Syne" }}>
          {done === exs.length ? "✓ Terminar entrenamiento" : "Terminar (" + done + "/" + exs.length + ")"}
        </button>
      </div>
      {editIdx !== null && (
        <ExModal ex={exs[editIdx]} restTimer={getTimer(exs[editIdx])}
          onSave={patch => { upEx(editIdx, { sets: patch.sets, reps: patch.reps, weight: patch.weight, customRest: patch.restTimer }); setEditIdx(null); }}
          onClose={() => setEditIdx(null)} />
      )}
      {timerSecs !== null && <RestTimer initial={timerSecs} onClose={() => setTimerSecs(null)} />}
      {histModal && <WeightHistory exName={histModal.exName} exId={histModal.exId} history={ud.history} onClose={() => setHistModal(null)} />}
    </div>
  );
}

// ═══════════════════════════════════════════════════════
// HISTORIAL SCREEN
// ═══════════════════════════════════════════════════════
function HistorialScreen({ ud, user }) {
  const [open, setOpen] = useState(null);
  const sessions = [...(ud.history || [])].sort((a, b) => b.date.localeCompare(a.date));

  return (
    <div style={scr}>
      <div style={{ padding: "28px 20px 16px" }}>
        <h2 style={h2s}>Historial</h2>
        <p style={{ color: "#555", fontSize: 12, margin: "4px 0 0", fontFamily: "JetBrains Mono" }}>{sessions.length} sesiones registradas</p>
      </div>
      <div style={{ flex: 1, overflowY: "auto", padding: "0 20px" }}>
        {sessions.length === 0
          ? <p style={{ color: "#333", textAlign: "center", padding: "60px 0", fontSize: 14 }}>Sin historial todavía.<br />Completa tu primer entrenamiento.</p>
          : sessions.map(s => (
          <div key={s.id} style={{ background: "#0e0e0e", border: "1px solid #1e1e1e", borderRadius: 14, marginBottom: 10, overflow: "hidden" }}>
            <button onClick={() => setOpen(open === s.id ? null : s.id)} style={{ width: "100%", background: "none", border: "none", cursor: "pointer", padding: "16px 18px", display: "flex", alignItems: "center", gap: 12, fontFamily: "Syne" }}>
              <div style={{ width: 40, height: 40, borderRadius: 10, background: user.accent + "15", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, fontSize: 18 }}>💪</div>
              <div style={{ flex: 1, textAlign: "left" }}>
                <p style={{ color: "#fff", fontWeight: 700, fontSize: 14, margin: 0 }}>{s.label}</p>
                <p style={{ color: "#555", fontSize: 11, margin: "2px 0 0", fontFamily: "JetBrains Mono" }}>{fmtDate(s.date)} · {(s.entries || []).length} ejercicios</p>
              </div>
              <span style={{ color: "#444", fontSize: 18, display: "inline-block", transform: open === s.id ? "rotate(180deg)" : "none", transition: "transform .2s" }}>⌄</span>
            </button>
            {open === s.id && (
              <div style={{ borderTop: "1px solid #1a1a1a", padding: "12px 18px" }}>
                {s.note && <p style={{ color: "#666", fontSize: 12, fontStyle: "italic", marginBottom: 10 }}>"{s.note}"</p>}
                {(s.entries || []).map((e, i) => {
                  const exName = ud.routines.flatMap(r => r.exercises).find(ex => ex.id === e.exId)?.name || e.exId;
                  return (
                    <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "7px 0", borderBottom: "1px solid #111" }}>
                      <span style={{ color: "#aaa", fontSize: 13 }}>{exName}</span>
                      <span style={{ color: "#666", fontSize: 12, fontFamily: "JetBrains Mono" }}>{e.sets}×{e.reps} · {e.weight}kg</span>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        ))}
        <div style={{ height: 40 }} />
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════
// ROUTINES SCREEN
// ═══════════════════════════════════════════════════════
function RoutinesScreen({ ud, user, onUpdate, goEdit, goAdd }) {
  const [open, setOpen] = useState({});
  const toggle = id => setOpen(p => ({ ...p, [id]: !p[id] }));
  function del(id) { if (confirm("¿Eliminar esta rutina?")) onUpdate({ ...ud, routines: ud.routines.filter(r => r.id !== id) }); }

  return (
    <div style={scr}>
      <div style={{ padding: "28px 20px 16px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div>
          <h2 style={h2s}>Rutinas</h2>
          <p style={{ color: "#555", fontSize: 12, margin: "4px 0 0", fontFamily: "JetBrains Mono" }}>{ud.routines.length} rutinas guardadas</p>
        </div>
        <button onClick={goAdd} style={{ background: user.accent, color: "#000", border: "none", borderRadius: 10, padding: "10px 16px", fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "Syne" }}>+ Nueva</button>
      </div>
      <div style={{ flex: 1, overflowY: "auto", padding: "0 20px" }}>
        {ud.routines.length === 0
          ? <p style={{ color: "#333", textAlign: "center", padding: "60px 0", fontSize: 14 }}>Sin rutinas. Crea la primera.</p>
          : ud.routines.map(r => (
          <div key={r.id} style={{ background: "#0e0e0e", border: "1px solid #1e1e1e", borderRadius: 14, marginBottom: 10, overflow: "hidden" }}>
            <div style={{ display: "flex", alignItems: "center", padding: "16px 18px", cursor: "pointer" }} onClick={() => toggle(r.id)}>
              <div style={{ flex: 1 }}>
                <p style={{ color: "#fff", fontWeight: 700, fontSize: 15, margin: 0 }}>{r.name}</p>
                <p style={{ color: "#555", fontSize: 11, margin: "3px 0 0", fontFamily: "JetBrains Mono" }}>{r.muscles} · {r.exercises.length} ej. · {r.restTimer}s</p>
              </div>
              <button onClick={e => { e.stopPropagation(); goEdit(r); }} style={{ background: "none", border: "1px solid #2a2a2a", borderRadius: 7, color: "#666", fontSize: 11, padding: "5px 10px", cursor: "pointer", fontFamily: "Syne", marginRight: 10 }}>Editar</button>
              <span style={{ color: "#444", fontSize: 20, display: "inline-block", transform: open[r.id] ? "rotate(180deg)" : "none", transition: "transform .2s" }}>⌄</span>
            </div>
            {open[r.id] && (
              <div style={{ borderTop: "1px solid #1a1a1a", padding: "12px 18px 16px" }}>
                {r.exercises.map(ex => (
                  <div key={ex.id} style={{ display: "flex", justifyContent: "space-between", padding: "9px 0", borderBottom: "1px solid #111" }}>
                    <span style={{ color: "#ccc", fontSize: 13 }}>{ex.name}</span>
                    <span style={{ color: "#555", fontSize: 12, fontFamily: "JetBrains Mono" }}>{ex.sets}×{ex.reps} · {ex.weight}kg</span>
                  </div>
                ))}
                <button onClick={() => del(r.id)} style={{ background: "none", border: "none", color: "#ff5555", fontSize: 11, marginTop: 12, cursor: "pointer", fontFamily: "Syne" }}>Eliminar rutina</button>
              </div>
            )}
          </div>
        ))}
        <div style={{ height: 40 }} />
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════
// HOME SCREEN
// ═══════════════════════════════════════════════════════
function HomeScreen({ ud, user, onStart }) {
  const [sel, setSel] = useState([]);
  const toggle = id => setSel(p => p.includes(id) ? p.filter(x => x !== id) : [...p, id]);

  const totalSessions = (ud.history || []).length;
  const thisWeek = (ud.history || []).filter(s => {
    const diff = (new Date() - new Date(s.date + "T12:00")) / 86400000;
    return diff <= 7;
  }).length;
  const lastSession = [...(ud.history || [])].sort((a, b) => b.date.localeCompare(a.date))[0];

  return (
    <div style={scr}>
      <div style={{ padding: "28px 20px 0" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 20 }}>
          <div>
            <p style={{ color: "#555", fontSize: 11, letterSpacing: 3, margin: 0 }}>BIENVENIDO</p>
            <h2 style={{ color: user.accent, fontSize: 26, fontWeight: 800, margin: "4px 0 0", letterSpacing: -1 }}>{user.name}</h2>
          </div>
          <div style={{ textAlign: "right" }}>
            <p style={{ color: "#555", fontSize: 10, margin: 0, fontFamily: "JetBrains Mono" }}>Esta semana</p>
            <p style={{ color: "#fff", fontSize: 22, fontWeight: 700, margin: "2px 0 0", fontFamily: "JetBrains Mono" }}>{thisWeek}</p>
          </div>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 24 }}>
          {[["Total sesiones", "💪 " + totalSessions], ["Último entreno", "📅 " + (lastSession ? fmtDate(lastSession.date) : "—")]].map(([l, v]) => (
            <div key={l} style={{ background: "#0e0e0e", border: "1px solid #1a1a1a", borderRadius: 12, padding: "14px" }}>
              <p style={{ color: "#444", fontSize: 10, letterSpacing: 1.5, margin: "0 0 6px" }}>{l.toUpperCase()}</p>
              <p style={{ color: "#fff", fontSize: 14, fontWeight: 700, margin: 0, fontFamily: "JetBrains Mono" }}>{v}</p>
            </div>
          ))}
        </div>
        <p style={{ color: "#fff", fontSize: 20, fontWeight: 800, margin: "0 0 4px", letterSpacing: -0.5 }}>¿Qué entrenas hoy?</p>
        <p style={{ color: "#444", fontSize: 12, margin: "0 0 16px" }}>Selecciona una o varias rutinas</p>
      </div>
      <div style={{ flex: 1, overflowY: "auto", padding: "0 20px" }}>
        {ud.routines.length === 0
          ? <p style={{ color: "#333", textAlign: "center", padding: "40px 0", fontSize: 14 }}>Sin rutinas. Ve a Rutinas y crea la primera.</p>
          : ud.routines.map(r => {
          const s = sel.includes(r.id);
          return (
            <button key={r.id} onClick={() => toggle(r.id)} style={{ display: "flex", alignItems: "center", width: "100%", boxSizing: "border-box", background: s ? user.accent + "12" : "#0e0e0e", border: "1.5px solid " + (s ? user.accent : "#1e1e1e"), borderRadius: 14, padding: "16px 18px", marginBottom: 10, cursor: "pointer", fontFamily: "Syne", transition: "all .15s", textAlign: "left" }}>
              <div style={{ width: 24, height: 24, borderRadius: "50%", flexShrink: 0, marginRight: 14, border: "1.5px solid " + (s ? user.accent : "#333"), background: s ? user.accent : "transparent", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, color: "#000", fontWeight: 700 }}>{s ? "✓" : ""}</div>
              <div style={{ flex: 1 }}>
                <p style={{ color: "#fff", fontWeight: 700, fontSize: 15, margin: 0 }}>{r.name}</p>
                <p style={{ color: "#555", fontSize: 11, margin: "3px 0 0", fontFamily: "JetBrains Mono" }}>{r.muscles} · {r.exercises.length} ejercicios</p>
              </div>
            </button>
          );
        })}
        <div style={{ height: 100 }} />
      </div>
      {sel.length > 0 && (
        <div style={{ padding: "14px 20px", borderTop: "1px solid #111" }}>
          <button onClick={() => onStart(sel)} style={{ width: "100%", background: user.accent, color: "#000", border: "none", borderRadius: 12, padding: 16, fontSize: 15, fontWeight: 800, cursor: "pointer", fontFamily: "Syne" }}>
            Empezar — {sel.length} rutina{sel.length > 1 ? "s" : ""}
          </button>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════
// WRAPPER
// ═══════════════════════════════════════════════════════
function Wrapper({ children }) {
  return (
    <div style={{ maxWidth: 430, margin: "0 auto", height: "100vh", display: "flex", flexDirection: "column", background: "#060606", overflow: "hidden" }}>
      {children}
    </div>
  );
}

// ═══════════════════════════════════════════════════════
// ROOT APP
// ═══════════════════════════════════════════════════════
const TABS = [
  { id: "home", label: "Hoy", icon: "🏠" },
  { id: "routines", label: "Rutinas", icon: "📋" },
  { id: "historial", label: "Historial", icon: "📈" },
];

function App() {
  const [data, setData] = useState(loadData);
  const [user, setUser] = useState(null);
  const [tab, setTab] = useState("home");
  const [overlay, setOverlay] = useState(null);

  const ud = user ? data[user.id] : null;
  function updateUd(newUd) { const d = { ...data, [user.id]: newUd }; setData(d); saveData(d); }

  if (!user) return <Login onLogin={u => { setUser(u); setTab("home"); }} />;

  if (overlay?.type === "session") {
    const selRoutines = ud.routines.filter(r => overlay.ids.includes(r.id));
    return (
      <Wrapper>
        <Session routines={selRoutines} user={user} ud={ud}
          onFinish={({ newRoutines, session }) => {
            updateUd({ ...ud, routines: newRoutines, history: [session, ...(ud.history || [])] });
            setOverlay(null); setTab("home");
          }}
          onCancel={() => setOverlay(null)} />
      </Wrapper>
    );
  }

  if (overlay?.type === "addRoutine") {
    return (
      <Wrapper>
        <RoutineEditor accent={user.accent}
          onSave={r => { updateUd({ ...ud, routines: [...ud.routines, { id: uid(), ...r }] }); setOverlay(null); setTab("routines"); }}
          onBack={() => setOverlay(null)} />
      </Wrapper>
    );
  }

  if (overlay?.type === "editRoutine") {
    return (
      <Wrapper>
        <RoutineEditor existing={overlay.routine} accent={user.accent}
          onSave={r => { updateUd({ ...ud, routines: ud.routines.map(x => x.id === overlay.routine.id ? { ...x, ...r } : x) }); setOverlay(null); setTab("routines"); }}
          onBack={() => setOverlay(null)} />
      </Wrapper>
    );
  }

  return (
    <Wrapper>
      <div style={{ flex: 1, overflow: "hidden", display: "flex", flexDirection: "column" }}>
        {tab === "home" && <HomeScreen ud={ud} user={user} onStart={ids => setOverlay({ type: "session", ids })} />}
        {tab === "routines" && <RoutinesScreen ud={ud} user={user} onUpdate={updateUd}
          goEdit={r => setOverlay({ type: "editRoutine", routine: r })}
          goAdd={() => setOverlay({ type: "addRoutine" })} />}
        {tab === "historial" && <HistorialScreen ud={ud} user={user} />}
      </div>
      <nav style={{ display: "flex", background: "#080808", borderTop: "1px solid #111", paddingBottom: "env(safe-area-inset-bottom, 0px)" }}>
        {TABS.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{ flex: 1, background: "none", border: "none", cursor: "pointer", padding: "11px 0 13px", color: tab === t.id ? user.accent : "#3a3a3a", fontFamily: "Syne, sans-serif", fontSize: 10, letterSpacing: 0.5, fontWeight: tab === t.id ? 700 : 400, display: "flex", flexDirection: "column", alignItems: "center", gap: 3, transition: "color .15s" }}>
            <span style={{ fontSize: 18 }}>{t.icon}</span>
            {t.label.toUpperCase()}
          </button>
        ))}
        <button onClick={() => setUser(null)} style={{ flex: 1, background: "none", border: "none", cursor: "pointer", padding: "11px 0 13px", color: "#2a2a2a", fontFamily: "Syne, sans-serif", fontSize: 10, letterSpacing: 0.5, display: "flex", flexDirection: "column", alignItems: "center", gap: 3 }}>
          <span style={{ fontSize: 18 }}>👤</span>SALIR
        </button>
      </nav>
    </Wrapper>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
