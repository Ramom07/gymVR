<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#060606"/>
<title>GymLog Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;width:100%;background:#060606;overflow:hidden}
body{font-family:'Syne',sans-serif;-webkit-tap-highlight-color:transparent}
input,button,textarea,select{outline:none;-webkit-appearance:none;font-family:'Syne',sans-serif}
input[type=range]{-webkit-appearance:none;height:4px;background:#2a2a2a;border-radius:2px;cursor:pointer;width:100%}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:#C8FF00;cursor:pointer}
::-webkit-scrollbar{width:0;height:0}
*{scrollbar-width:none}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1a1a1a;border:1px solid #333;color:#fff;padding:10px 22px;border-radius:12px;font-size:13px;z-index:99999;white-space:nowrap;pointer-events:none;animation:fadeup .3s ease}
@keyframes fadeup{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo}=React;

// ─── CONFIG ───────────────────────────────────────────────────────────────────
const USERS=[
  {id:"ramon",name:"Ramón",emoji:"⚡",pin:"1234",accent:"#C8FF00"},
  {id:"novia",name:"Mi Amor",emoji:"💜",pin:"5678",accent:"#FF6DD4"},
];
const KEY="gymlog_v4";

// ─── SEED DATA ────────────────────────────────────────────────────────────────
const SEED={
  ramon:{
    routines:[
      {id:"r1",name:"Espalda",muscles:"Espalda",restTimer:90,exercises:[
        {id:"e1",name:"Jalón al pecho",sets:4,reps:"10-12",weight:60},
        {id:"e2",name:"Remo con barra",sets:4,reps:"8-10",weight:80},
        {id:"e3",name:"Facepull",sets:3,reps:"15",weight:25},
      ]},
      {id:"r2",name:"Bíceps",muscles:"Bíceps",restTimer:60,exercises:[
        {id:"e4",name:"Curl con barra",sets:3,reps:"10-12",weight:30},
        {id:"e5",name:"Curl martillo",sets:3,reps:"12",weight:14},
      ]},
      {id:"r3",name:"Pierna",muscles:"Cuádriceps · Isquiotibiales",restTimer:120,exercises:[
        {id:"e6",name:"Sentadilla",sets:4,reps:"8-10",weight:100},
        {id:"e7",name:"Prensa",sets:3,reps:"12",weight:140},
        {id:"e8",name:"Extensión",sets:3,reps:"15",weight:50},
      ]},
      {id:"r4",name:"Pecho",muscles:"Pectorales · Tríceps",restTimer:90,exercises:[
        {id:"e9",name:"Press banca",sets:4,reps:"8-10",weight:70},
        {id:"e10",name:"Aperturas",sets:3,reps:"12",weight:14},
        {id:"e11",name:"Fondos",sets:3,reps:"12",weight:0},
      ]},
    ],
    sessions:[],
  },
  novia:{routines:[],sessions:[]},
};

// ─── PERSISTENCE ──────────────────────────────────────────────────────────────
function loadAll(){
  try{
    const raw=localStorage.getItem(KEY);
    if(!raw) return JSON.parse(JSON.stringify(SEED));
    const d=JSON.parse(raw);
    // ensure both users exist and migrate old "history" key
    for(const uid of["ramon","novia"]){
      if(!d[uid]) d[uid]={routines:[],sessions:[]};
      if(d[uid].history&&!d[uid].sessions){d[uid].sessions=d[uid].history;delete d[uid].history;}
      if(!d[uid].sessions) d[uid].sessions=[];
      if(!d[uid].routines) d[uid].routines=[];
    }
    return d;
  }catch{return JSON.parse(JSON.stringify(SEED));}
}
function persist(d){try{localStorage.setItem(KEY,JSON.stringify(d));}catch(e){console.error(e);}}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
const uid=()=>Math.random().toString(36).slice(2,9);
const todayISO=()=>new Date().toISOString().slice(0,10);
const fmtDate=iso=>new Date(iso+"T12:00:00").toLocaleDateString("es-MX",{weekday:"short",day:"numeric",month:"short"});

// Parse reps — handles "10-12" → 11, "12" → 12
const parseReps=r=>{const p=String(r).split("-");return p.length===2?Math.round((+p[0]+ +p[1])/2):parseInt(p[0])||1;};
const calc1RM=(kg,reps)=>Math.round(parseFloat(kg||0)*(1+parseReps(reps)/30));
const calcVol=(sets,reps,kg)=>Math.round(parseInt(sets||0)*parseReps(reps)*parseFloat(kg||0));

// All weight entries for one exercise across sessions
function exLogs(sessions,exId){
  const logs=[];
  for(const s of(sessions||[])){
    for(const e of(s.exercises||[])){
      // match by id OR exId (backwards compat)
      if(e.id===exId||e.exId===exId){
        logs.push({date:s.date,weight:parseFloat(e.weight)||0,sets:e.sets||0,reps:e.reps||0,vol:calcVol(e.sets,e.reps,e.weight)});
      }
    }
  }
  return logs.sort((a,b)=>a.date.localeCompare(b.date));
}

function getPR(sessions,exId){
  const logs=exLogs(sessions,exId);
  return logs.length?Math.max(...logs.map(l=>l.weight)):0;
}

function calcStreak(sessions){
  if(!sessions||!sessions.length) return 0;
  const days=[...new Set(sessions.map(s=>s.date))].sort((a,b)=>b.localeCompare(a));
  const t=todayISO(),y=new Date(Date.now()-86400000).toISOString().slice(0,10);
  if(days[0]!==t&&days[0]!==y) return 0;
  let n=1;
  for(let i=1;i<days.length;i++){
    const diff=Math.round((new Date(days[i-1]+"T12:00")-new Date(days[i]+"T12:00"))/86400000);
    if(diff===1)n++;else break;
  }
  return n;
}

// ─── STYLES ───────────────────────────────────────────────────────────────────
const S={
  scr:{display:"flex",flexDirection:"column",height:"100%",overflow:"hidden"},
  h2:{color:"#fff",fontSize:22,fontWeight:800,margin:0,letterSpacing:-0.5},
  lbl:{color:"#444",fontSize:10,letterSpacing:2,margin:"0 0 6px",display:"block"},
  back:{background:"none",border:"none",color:"#555",cursor:"pointer",fontSize:22,padding:0},
  inp:{width:"100%",background:"#1a1a1a",border:"1px solid #2a2a2a",borderRadius:10,padding:11,color:"#fff",fontSize:16,fontFamily:"JetBrains Mono,monospace",textAlign:"center",boxSizing:"border-box"},
  card:{background:"#0e0e0e",border:"1px solid #1e1e1e",borderRadius:14,overflow:"hidden"},
};

// ─── TOAST ────────────────────────────────────────────────────────────────────
function Toast({msg}){
  return msg?<div className="toast">{msg}</div>:null;
}
function useToast(){
  const [msg,setMsg]=useState(null);
  const ref=useRef();
  const show=useCallback((m)=>{
    clearTimeout(ref.current);
    setMsg(m);
    ref.current=setTimeout(()=>setMsg(null),2800);
  },[]);
  return{msg,show};
}

// ─── SPARKLINE ────────────────────────────────────────────────────────────────
function Sparkline({data,color,w=260,h=52}){
  if(!data||data.length<2) return null;
  const min=Math.min(...data),max=Math.max(...data),range=max-min||1;
  const pts=data.map((v,i)=>{
    const x=(i/(data.length-1))*w;
    const y=h-((v-min)/range)*(h-8)-4;
    return x+","+y;
  }).join(" ");
  const last=pts.trim().split(" ").pop().split(",");
  return(
    <svg width={w} height={h} viewBox={"0 0 "+w+" "+h} style={{overflow:"visible",display:"block"}}>
      <polyline points={pts} fill="none" stroke={color} strokeWidth={2.5} strokeLinejoin="round" strokeLinecap="round"/>
      <circle cx={parseFloat(last[0])} cy={parseFloat(last[1])} r={4} fill={color}/>
    </svg>
  );
}

// ─── REST TIMER ───────────────────────────────────────────────────────────────
function RestTimer({initial,onClose}){
  const [total,setTotal]=useState(initial);
  const [rem,setRem]=useState(initial);
  const [running,setRunning]=useState(true);
  const tick=useRef();
  useEffect(()=>{
    if(running&&rem>0){tick.current=setTimeout(()=>setRem(r=>r-1),1000);}
    return()=>clearTimeout(tick.current);
  },[running,rem]);
  useEffect(()=>{if(rem===0&&navigator.vibrate)navigator.vibrate([300,100,300]);},[rem]);
  const pct=total>0?(rem/total)*100:0;
  const R=72,circ=2*Math.PI*R;
  const mm=String(Math.floor(rem/60)).padStart(2,"0");
  const ss=String(rem%60).padStart(2,"0");
  const done=rem===0;
  function adj(d){const nt=Math.max(10,total+d);setTotal(nt);setRem(r=>Math.max(0,Math.min(r+d,nt)));}
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.97)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",zIndex:9999,gap:22}}>
      <p style={{color:"#555",fontSize:11,letterSpacing:4,textTransform:"uppercase",margin:0}}>Tiempo de descanso</p>
      <div style={{position:"relative",width:190,height:190}}>
        <svg width={190} height={190} style={{position:"absolute",transform:"rotate(-90deg)"}}>
          <circle cx={95} cy={95} r={R} fill="none" stroke="#1a1a1a" strokeWidth={7}/>
          <circle cx={95} cy={95} r={R} fill="none" stroke={done?"#3aff8a":"#C8FF00"} strokeWidth={7}
            strokeDasharray={circ} strokeDashoffset={circ*(1-pct/100)}
            style={{transition:"stroke-dashoffset 1s linear,stroke .4s"}}/>
        </svg>
        <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
          <span style={{fontFamily:"JetBrains Mono,monospace",fontSize:48,fontWeight:500,color:done?"#3aff8a":"#fff",lineHeight:1}}>{mm}:{ss}</span>
          {done&&<span style={{fontSize:11,color:"#3aff8a",letterSpacing:3,marginTop:6}}>¡LISTO!</span>}
        </div>
      </div>
      <div style={{display:"flex",gap:8}}>
        {[-30,-15,+15,+30].map(d=>(
          <button key={d} onClick={()=>adj(d)} style={{background:"#1a1a1a",border:"1px solid #2a2a2a",borderRadius:8,color:d>0?"#C8FF00":"#ff6464",fontFamily:"JetBrains Mono,monospace",fontSize:12,padding:"7px 10px",cursor:"pointer"}}>
            {d>0?"+":""}{d}s
          </button>
        ))}
      </div>
      <div style={{display:"flex",gap:10}}>
        <button onClick={()=>{setRem(total);setRunning(true);}} style={{background:"#1e1e1e",color:"#888",border:"none",borderRadius:10,padding:"10px 16px",fontSize:14,cursor:"pointer"}}>↺</button>
        <button onClick={()=>setRunning(r=>!r)} style={{background:"#1e1e1e",color:"#fff",border:"none",borderRadius:10,padding:"10px 22px",fontSize:18,cursor:"pointer"}}>{running?"⏸":"▶"}</button>
        <button onClick={onClose} style={{background:"#C8FF00",color:"#000",border:"none",borderRadius:10,padding:"10px 22px",fontSize:13,fontWeight:700,cursor:"pointer"}}>Cerrar</button>
      </div>
      <p style={{color:"#222",fontSize:11,fontFamily:"JetBrains Mono"}}>{total}s totales</p>
    </div>
  );
}

// ─── PROGRESS MODAL ──────────────────────────────────────────────────────────
function ProgressModal({exName,exId,sessions,accent,onClose}){
  const logs=exLogs(sessions,exId);
  const pr=logs.length?Math.max(...logs.map(l=>l.weight)):0;
  const last=logs.length?logs[logs.length-1]:null;
  const rm1=last?calc1RM(last.weight,last.reps):0;
  const weights=logs.map(l=>l.weight);
  const recent=logs.slice().reverse().slice(0,10);
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.93)",zIndex:9999,display:"flex",alignItems:"flex-end"}}>
      <div style={{background:"#0a0a0a",width:"100%",maxHeight:"88vh",borderRadius:"22px 22px 0 0",overflow:"hidden",display:"flex",flexDirection:"column"}}>
        <div style={{padding:"20px 20px 14px",borderBottom:"1px solid #1a1a1a",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <p style={{margin:0,fontSize:10,color:"#555",letterSpacing:3}}>PROGRESO</p>
            <p style={{margin:"2px 0 0",fontSize:19,fontWeight:800,color:"#fff"}}>{exName}</p>
          </div>
          <button onClick={onClose} style={{background:"#1a1a1a",border:"none",borderRadius:"50%",width:34,height:34,color:"#888",cursor:"pointer",fontSize:18}}>✕</button>
        </div>
        <div style={{overflowY:"auto",padding:"16px 20px",flex:1}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:18}}>
            {[["🏆 PR","#FFD700",pr+"kg"],["💪 1RM≈",accent,rm1+"kg"],["📅 Sesiones","#aaa",logs.length]].map(([l,c,v])=>(
              <div key={l} style={{background:"#111",borderRadius:10,padding:"10px 8px",textAlign:"center"}}>
                <p style={{color:"#555",fontSize:9,letterSpacing:1,margin:"0 0 4px"}}>{l}</p>
                <p style={{color:c,fontSize:16,fontWeight:700,margin:0,fontFamily:"JetBrains Mono"}}>{v}</p>
              </div>
            ))}
          </div>
          {weights.length>=2&&(
            <div style={{background:"#111",borderRadius:12,padding:"14px 16px",marginBottom:16,overflowX:"auto"}}>
              <p style={{color:"#555",fontSize:10,letterSpacing:2,margin:"0 0 10px"}}>EVOLUCIÓN DE PESO (kg)</p>
              <Sparkline data={weights} color={accent} w={Math.max(260,weights.length*28)} h={52}/>
              <div style={{display:"flex",justifyContent:"space-between",marginTop:6}}>
                <span style={{color:"#333",fontSize:10,fontFamily:"JetBrains Mono"}}>{logs[0]?.date}</span>
                <span style={{color:"#333",fontSize:10,fontFamily:"JetBrains Mono"}}>{logs[logs.length-1]?.date}</span>
              </div>
            </div>
          )}
          {recent.length===0
            ?<p style={{color:"#444",textAlign:"center",padding:"32px 0",fontSize:14}}>Sin registros todavía.</p>
            :recent.map((l,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",padding:"10px 0",borderBottom:"1px solid #111"}}>
              <div style={{flex:1}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{color:"#aaa",fontSize:12}}>{fmtDate(l.date)}</span>
                  {l.weight===pr&&i===0&&<span style={{fontSize:9,background:"#FFD70020",color:"#FFD700",border:"1px solid #FFD70044",borderRadius:4,padding:"1px 6px",letterSpacing:1}}>🏆 PR</span>}
                </div>
                <span style={{color:"#444",fontSize:11,fontFamily:"JetBrains Mono"}}>Vol: {l.vol}kg</span>
              </div>
              <span style={{color:"#fff",fontSize:14,fontFamily:"JetBrains Mono",fontWeight:500}}>{l.weight}kg · {l.sets}×{l.reps}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── EXERCISE EDIT MODAL ─────────────────────────────────────────────────────
function ExModal({ex,restTimer,sessions,accent,onSave,onClose}){
  const [sets,setSets]=useState(String(ex.sets));
  const [reps,setReps]=useState(String(ex.reps));
  const [weight,setWeight]=useState(String(ex.weight));
  const [timer,setTimer]=useState(restTimer);
  const pr=getPR(sessions,ex.id||ex.origId);
  const rm1=calc1RM(parseFloat(weight)||0,reps);
  const isNewPR=parseFloat(weight)>pr&&pr>0;
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",zIndex:9000,display:"flex",alignItems:"flex-end"}}>
      <div style={{background:"#0e0e0e",width:"100%",borderRadius:"20px 20px 0 0",padding:"22px 20px 40px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
          <div>
            <p style={{color:"#fff",fontWeight:800,fontSize:17,margin:0}}>{ex.name}</p>
            <div style={{display:"flex",gap:10,marginTop:4,flexWrap:"wrap"}}>
              {pr>0&&<span style={{color:"#FFD700",fontSize:11,fontFamily:"JetBrains Mono"}}>🏆 PR: {pr}kg</span>}
              <span style={{color:"#555",fontSize:11,fontFamily:"JetBrains Mono"}}>1RM≈{rm1}kg</span>
            </div>
            {isNewPR&&<div style={{marginTop:6,background:"#FFD70015",border:"1px solid #FFD70044",borderRadius:8,padding:"4px 10px",display:"inline-block"}}>
              <span style={{color:"#FFD700",fontSize:11,fontWeight:700}}>🔥 ¡Nuevo récord personal!</span>
            </div>}
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#666",cursor:"pointer",fontSize:22}}>✕</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:16}}>
          {[["Series",sets,setSets],["Reps",reps,setReps],["Peso (kg)",weight,setWeight]].map(([l,v,sv])=>(
            <div key={l}>
              <span style={S.lbl}>{l.toUpperCase()}</span>
              <input value={v} onChange={e=>sv(e.target.value)} style={S.inp}/>
            </div>
          ))}
        </div>
        <div style={{marginBottom:20}}>
          <span style={{...S.lbl,marginBottom:8}}>DESCANSO (segundos)</span>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
            <input type="range" min={10} max={300} step={5} value={timer} onChange={e=>setTimer(+e.target.value)} style={{accentColor:accent}}/>
            <span style={{color:accent,fontSize:14,fontFamily:"JetBrains Mono",minWidth:40,textAlign:"right"}}>{timer}s</span>
          </div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {[30,45,60,90,120,180].map(s=>(
              <button key={s} onClick={()=>setTimer(s)} style={{background:timer===s?accent:"#1a1a1a",color:timer===s?"#000":"#777",border:"none",borderRadius:6,padding:"5px 10px",fontSize:11,cursor:"pointer",fontFamily:"JetBrains Mono,monospace",fontWeight:600}}>{s}s</button>
            ))}
          </div>
        </div>
        <button onClick={()=>onSave({sets,reps,weight,restTimer:timer})} style={{width:"100%",background:accent,color:"#000",border:"none",borderRadius:12,padding:"15px",fontSize:15,fontWeight:700,cursor:"pointer"}}>
          {isNewPR?"💥 Guardar nuevo PR":"Guardar"}
        </button>
      </div>
    </div>
  );
}

// ─── ROUTINE EDITOR ───────────────────────────────────────────────────────────
function RoutineEditor({existing,onSave,onBack,accent}){
  const [name,setName]=useState(existing?.name||"");
  const [muscles,setMuscles]=useState(existing?.muscles||"");
  const [rest,setRest]=useState(existing?.restTimer||90);
  const [exs,setExs]=useState(()=>existing?.exercises||[]);
  const add=()=>setExs(p=>[...p,{id:uid(),name:"",sets:3,reps:"10-12",weight:0}]);
  const upd=(id,f,v)=>setExs(p=>p.map(e=>e.id===id?{...e,[f]:v}:e));
  const rm=id=>setExs(p=>p.filter(e=>e.id!==id));
  const move=(id,dir)=>setExs(p=>{
    const i=p.findIndex(e=>e.id===id),ni=i+dir;
    if(ni<0||ni>=p.length) return p;
    const a=[...p];[a[i],a[ni]]=[a[ni],a[i]];return a;
  });
  return(
    <div style={S.scr}>
      <div style={{padding:"20px 20px 0",display:"flex",gap:12,alignItems:"center"}}>
        <button onClick={onBack} style={S.back}>←</button>
        <h2 style={S.h2}>{existing?"Editar rutina":"Nueva rutina"}</h2>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"20px"}}>
        {[["Nombre",name,setName,"Ej. Espalda"],["Músculo(s)",muscles,setMuscles,"Ej. Espalda · Bíceps"]].map(([l,v,sv,ph])=>(
          <div key={l} style={{marginBottom:16}}>
            <span style={S.lbl}>{l.toUpperCase()}</span>
            <input value={v} onChange={e=>sv(e.target.value)} placeholder={ph} style={{...S.inp,textAlign:"left",padding:"12px 14px"}}/>
          </div>
        ))}
        <div style={{marginBottom:24}}>
          <span style={S.lbl}>DESCANSO POR DEFECTO</span>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
            <input type="range" min={10} max={300} step={5} value={rest} onChange={e=>setRest(+e.target.value)} style={{accentColor:accent}}/>
            <span style={{color:accent,fontSize:14,fontFamily:"JetBrains Mono",minWidth:40,textAlign:"right"}}>{rest}s</span>
          </div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {[30,60,90,120,180].map(s=>(
              <button key={s} onClick={()=>setRest(s)} style={{background:rest===s?accent:"#1a1a1a",color:rest===s?"#000":"#666",border:"none",borderRadius:6,padding:"5px 10px",fontSize:11,cursor:"pointer",fontFamily:"JetBrains Mono,monospace",fontWeight:600}}>{s}s</button>
            ))}
          </div>
        </div>
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <span style={{...S.lbl,margin:0}}>EJERCICIOS</span>
            <button onClick={add} style={{background:accent+"22",color:accent,border:"1px solid "+accent+"44",borderRadius:8,padding:"6px 14px",fontSize:12,cursor:"pointer"}}>+ Agregar</button>
          </div>
          {exs.map((ex,idx)=>(
            <div key={ex.id} style={{background:"#0e0e0e",border:"1px solid #1e1e1e",borderRadius:14,padding:14,marginBottom:10}}>
              <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:10}}>
                <div style={{display:"flex",flexDirection:"column",gap:2}}>
                  <button onClick={()=>move(ex.id,-1)} disabled={idx===0} style={{background:"none",border:"none",color:idx===0?"#2a2a2a":"#555",cursor:idx===0?"default":"pointer",fontSize:10,padding:0,lineHeight:1.5}}>▲</button>

// ─── SESSION SCREEN ───────────────────────────────────────────────────────────
function SessionScreen({routines,user,sessions,onFinish,onCancel}){
  const init=()=>routines.flatMap(r=>r.exercises.map(e=>({
    ...e, origId:e.id, routineId:r.id, routineName:r.name, routineRest:r.restTimer, done:false, customRest:null,
  })));
  const [exs,setExs]=useState(init);
  const [editIdx,setEditIdx]=useState(null);
  const [timer,setTimer]=useState(null);
  const [prog,setProg]=useState(null);
  const [note,setNote]=useState("");
  const [start]=useState(Date.now());
  const {msg,show}=useToast();

  const upd=(idx,patch)=>setExs(p=>p.map((e,i)=>i===idx?{...e,...patch}:e));
  const getTimer=ex=>ex.customRest!=null?ex.customRest:ex.routineRest;

  function finish(){
    const dur=Math.round((Date.now()-start)/60000);
    const exercises=exs.map(e=>({
      id:e.origId,       // ← key for future lookups
      exId:e.origId,     // ← backwards compat
      name:e.name,
      routineId:e.routineId,
      sets:e.sets,
      reps:e.reps,
      weight:parseFloat(e.weight)||0,
    }));
    const totalVol=exercises.reduce((a,e)=>a+calcVol(e.sets,e.reps,e.weight),0);
    const session={id:uid(),date:todayISO(),label:routines.map(r=>r.name).join(" + "),note,duration:dur,totalVolume:totalVol,exercises};
    const updatedRoutines=routines.map(r=>({
      ...r,
      exercises:r.exercises.map(ex=>{
        const u=exs.find(e=>e.origId===ex.id&&e.routineId===r.id);
        return u?{...ex,sets:parseInt(u.sets)||ex.sets,reps:u.reps,weight:parseFloat(u.weight)||ex.weight}:ex;
      }),
    }));
    onFinish({session,updatedRoutines});
  }

  const done=exs.filter(e=>e.done).length;
  const totalVol=exs.reduce((a,e)=>a+calcVol(e.sets,e.reps,e.weight),0);

  return(
    <div style={S.scr}>
      <div style={{padding:"18px 20px 0"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4}}>
          <button onClick={onCancel} style={S.back}>←</button>
          <div style={{flex:1}}>
            <h2 style={{...S.h2,fontSize:17}}>{routines.map(r=>r.name).join(" + ")}</h2>
            <p style={{color:"#555",fontSize:11,margin:0,fontFamily:"JetBrains Mono"}}>{fmtDate(todayISO())} · Vol: {totalVol.toLocaleString()}kg</p>
          </div>
          <span style={{color:"#555",fontSize:12,fontFamily:"JetBrains Mono"}}>{done}/{exs.length}</span>
        </div>
        <div style={{height:3,background:"#1a1a1a",borderRadius:2,marginTop:12}}>
          <div style={{height:"100%",width:(exs.length?(done/exs.length)*100:0)+"%",background:user.accent,borderRadius:2,transition:"width .4s"}}/>
        </div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"16px 20px"}}>
        {routines.map(r=>(
          <div key={r.id} style={{marginBottom:28}}>
            <p style={{...S.lbl,color:user.accent,marginBottom:12,letterSpacing:3}}>{r.name.toUpperCase()}</p>
            {exs.map((ex,idx)=>{
              if(ex.routineId!==r.id) return null;
              const pr=getPR(sessions,ex.origId);
              const newPR=ex.done&&parseFloat(ex.weight)>pr&&pr>0;
              return(
                <div key={ex.origId+"-"+idx} style={{background:ex.done?"#0c160c":"#0e0e0e",border:"1px solid "+(newPR?"#FFD70060":ex.done?"#2a4a2a":"#1e1e1e"),borderRadius:14,padding:"14px 16px",marginBottom:10,transition:"all .25s"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                    <div>
                      <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                        <p style={{color:ex.done?"#5aaa3a":"#fff",fontWeight:700,fontSize:15,margin:0}}>{ex.name}</p>
                        {newPR&&<span style={{fontSize:9,background:"#FFD70020",color:"#FFD700",border:"1px solid #FFD70044",borderRadius:4,padding:"1px 6px",letterSpacing:1,flexShrink:0}}>🔥 PR</span>}
                      </div>
                      <div style={{display:"flex",gap:8,marginTop:3,flexWrap:"wrap"}}>
                        <span style={{color:"#555",fontSize:11,fontFamily:"JetBrains Mono"}}>{ex.sets}×{ex.reps} · {ex.weight}kg</span>
                        {pr>0&&<span style={{color:"#333",fontSize:11,fontFamily:"JetBrains Mono"}}>PR:{pr}kg</span>}
                      </div>
                    </div>
                    <button onClick={()=>setEditIdx(idx)} style={{background:"#1a1a1a",border:"none",borderRadius:8,color:"#888",fontSize:11,padding:"5px 10px",cursor:"pointer",flexShrink:0}}>Editar</button>
                  </div>
                  <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                    <button onClick={()=>{
                      const nd=!ex.done;
                      upd(idx,{done:nd});
                      if(nd&&parseFloat(ex.weight)>pr&&pr>0) show("🏆 ¡Nuevo récord personal!");
                    }} style={{flex:1,background:ex.done?"#1e3a1e":"#1a1a1a",border:"1px solid "+(ex.done?"#3a6a3a":"#2a2a2a"),borderRadius:8,color:ex.done?"#5aaa3a":"#888",fontSize:12,padding:"9px 0",cursor:"pointer",fontWeight:600}}>
                      {ex.done?"✓ Completado":"Marcar listo"}
                    </button>
                    {ex.done&&(
                      <button onClick={()=>setTimer(getTimer(ex))} style={{background:user.accent+"18",border:"1px solid "+user.accent+"44",borderRadius:8,color:user.accent,fontSize:12,padding:"9px 14px",cursor:"pointer",fontWeight:600}}>⏱ {getTimer(ex)}s</button>
                    )}
                    <button onClick={()=>setProg({exId:ex.origId,exName:ex.name})} style={{background:"#1a1a1a",border:"1px solid #2a2a2a",borderRadius:8,color:"#555",fontSize:12,padding:"9px 12px",cursor:"pointer"}}>📊</button>
                  </div>
                </div>
              );
            })}
          </div>
        ))}
        <div style={{marginBottom:16}}>
          <span style={S.lbl}>NOTA DEL ENTRENAMIENTO</span>
          <textarea value={note} onChange={e=>setNote(e.target.value)} rows={3} placeholder="Cómo te sentiste, qué mejorar..."
            style={{...S.inp,textAlign:"left",padding:"12px",resize:"none",width:"100%"}}/>
        </div>
        <div style={{height:90}}/>
      </div>
      <div style={{padding:"12px 20px",borderTop:"1px solid #111"}}>
        <button onClick={finish} style={{width:"100%",background:user.accent,color:"#000",border:"none",borderRadius:12,padding:15,fontSize:15,fontWeight:700,cursor:"pointer"}}>
          {done===exs.length?"✓ Terminar entrenamiento":"Terminar ("+done+"/"+exs.length+")"}
        </button>
      </div>
      {editIdx!==null&&<ExModal ex={exs[editIdx]} restTimer={getTimer(exs[editIdx])} sessions={sessions} accent={user.accent}
        onSave={p=>{upd(editIdx,{sets:p.sets,reps:p.reps,weight:p.weight,customRest:p.restTimer});setEditIdx(null);}}
        onClose={()=>setEditIdx(null)}/>}
      {timer!==null&&<RestTimer initial={timer} onClose={()=>setTimer(null)}/>}
      {prog&&<ProgressModal exName={prog.exName} exId={prog.exId} sessions={sessions} accent={user.accent} onClose={()=>setProg(null)}/>}
      <Toast msg={msg}/>
    </div>
  );
}

  );
}

// ─── SETTINGS / PROFILE SCREEN ────────────────────────────────────────────────
function ProfileScreen({user,data,onImport,onLogout}){
  const ud=data[user.id];
  const sessions=ud.sessions||[];
  const streak=calcStreak(sessions);
  const totalVol=sessions.reduce((a,s)=>a+(s.totalVolume||0),0);
  const prs=ud.routines.flatMap(r=>r.exercises)
    .map(ex=>({name:ex.name,pr:getPR(sessions,ex.id)}))
    .filter(x=>x.pr>0)
    .sort((a,b)=>b.pr-a.pr);

  function exportData(){
    const json=JSON.stringify(data,null,2);
    const blob=new Blob([json],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download="gymlog_backup_"+todayISO()+".json";a.click();
    URL.revokeObjectURL(url);
  }
  function importData(e){
    const file=e.target.files[0];if(!file)return;
    const r=new FileReader();
    r.onload=ev=>{try{const p=JSON.parse(ev.target.result);if(confirm("¿Importar? Esto reemplaza los datos actuales."))onImport(p);}catch{alert("Archivo inválido");}};
    r.readAsText(file);
  }

  return(
    <div style={S.scr}>
      <div style={{padding:"28px 20px 16px"}}>
        <h2 style={S.h2}>Perfil</h2>
        <div style={{display:"flex",alignItems:"center",gap:14,marginTop:16,padding:"16px",background:"#0e0e0e",borderRadius:14,border:"1px solid #1e1e1e"}}>
          <div style={{width:52,height:52,borderRadius:"50%",background:user.accent+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:30,flexShrink:0}}>{user.emoji}</div>
          <div>
            <p style={{color:"#fff",fontWeight:800,fontSize:19,margin:0}}>{user.name}</p>
            <p style={{color:user.accent,fontSize:12,margin:"3px 0 0",fontFamily:"JetBrains Mono"}}>{streak>0?"🔥 "+streak+" día"+(streak>1?"s":"")+" de racha":"Sin racha activa"}</p>
          </div>
        </div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"0 20px"}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:20}}>
          {[["Sesiones","💪",sessions.length],["Racha","🔥",streak+"d"],["Volumen","⚡",Math.round(totalVol/1000)+"t"]].map(([l,ic,v])=>(
            <div key={l} style={{background:"#0e0e0e",border:"1px solid #1a1a1a",borderRadius:12,padding:"12px 8px",textAlign:"center"}}>
              <p style={{color:"#555",fontSize:9,letterSpacing:1,margin:"0 0 4px"}}>{l.toUpperCase()}</p>
              <p style={{color:"#fff",fontSize:18,fontWeight:700,margin:0,fontFamily:"JetBrains Mono"}}>{ic} {v}</p>
            </div>
          ))}
        </div>

        {prs.length>0&&<>
          <span style={{...S.lbl,marginBottom:10}}>MIS RÉCORDS PERSONALES</span>
          {prs.slice(0,8).map(({name,pr})=>(
            <div key={name} style={{display:"flex",justifyContent:"space-between",padding:"9px 0",borderBottom:"1px solid #111"}}>
              <span style={{color:"#aaa",fontSize:13}}>{name}</span>
              <span style={{color:"#FFD700",fontSize:13,fontFamily:"JetBrains Mono",fontWeight:600}}>🏆 {pr}kg</span>
            </div>
          ))}
          <div style={{height:20}}/>
        </>}

        <span style={{...S.lbl,marginBottom:10}}>DATOS</span>
        <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:24}}>
          <button onClick={exportData} style={{background:"#0e0e0e",border:"1px solid #2a2a2a",borderRadius:12,padding:"14px",color:"#fff",fontSize:14,cursor:"pointer",fontWeight:600,textAlign:"left"}}>📤 Exportar mis datos</button>
          <label style={{background:"#0e0e0e",border:"1px solid #2a2a2a",borderRadius:12,padding:"14px",color:"#fff",fontSize:14,cursor:"pointer",fontWeight:600,display:"block"}}>
            📥 Importar datos
            <input type="file" accept=".json" onChange={importData} style={{display:"none"}}/>
          </label>
          <button onClick={()=>{if(confirm("¿Borrar TODO tu historial? No se puede deshacer."))onImport({...data,[user.id]:{routines:data[user.id].routines,sessions:[]}});}} style={{background:"#120808",border:"1px solid #3a1a1a",borderRadius:12,padding:"14px",color:"#ff5555",fontSize:14,cursor:"pointer",fontWeight:600,textAlign:"left"}}>
            🗑 Borrar historial
          </button>
        </div>
        <button onClick={onLogout} style={{width:"100%",background:"#111",border:"1px solid #222",borderRadius:12,padding:14,color:"#555",fontSize:14,cursor:"pointer",fontWeight:600}}>Cerrar sesión</button>
        <div style={{height:40}}/>
      </div>
    </div>
  );
}

              <p style={{color:"#fff",fontSize:12,fontWeight:700,margin:0,fontFamily:"JetBrains Mono"}}>{v}</p>

          ))}
        </div>
        <p style={{color:"#fff",fontSize:20,fontWeight:800,margin:"0 0 4px",letterSpacing:-0.5}}>¿Qué entrenas hoy?</p>
        <p style={{color:"#444",fontSize:12,margin:"0 0 14px"}}>Selecciona una o varias rutinas</p>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"0 20px"}}>
        {ud.routines.length===0
          ?<p style={{color:"#333",textAlign:"center",padding:"40px 0",fontSize:14}}>Sin rutinas. Ve a Rutinas y crea la primera.</p>
          :ud.routines.map(r=>{
          const s=sel.includes(r.id);
          const lastR=[...sessions].filter(ss=>ss.label&&ss.label.includes(r.name)).sort((a,b)=>b.date.localeCompare(a.date))[0];
          return(
            <button key={r.id} onClick={()=>tog(r.id)} style={{display:"flex",alignItems:"center",width:"100%",boxSizing:"border-box",background:s?user.accent+"12":"#0e0e0e",border:"1.5px solid "+(s?user.accent:"#1e1e1e"),borderRadius:14,padding:"14px 18px",marginBottom:10,cursor:"pointer",textAlign:"left",transition:"all .15s"}}>
              <div style={{width:24,height:24,borderRadius:"50%",flexShrink:0,marginRight:14,border:"1.5px solid "+(s?user.accent:"#333"),background:s?user.accent:"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:"#000",fontWeight:700}}>{s?"✓":""}</div>
              <div style={{flex:1}}>
                <p style={{color:"#fff",fontWeight:700,fontSize:15,margin:0}}>{r.name}</p>
                <p style={{color:"#555",fontSize:11,margin:"3px 0 0",fontFamily:"JetBrains Mono"}}>{r.muscles} · {r.exercises.length} ej.</p>
              </div>
              {lastR&&<span style={{color:"#2a2a2a",fontSize:10,fontFamily:"JetBrains Mono",flexShrink:0,marginLeft:8}}>{fmtDate(lastR.date)}</span>}
            </button>
          );
        })}
        <div style={{height:100}}/>
      </div>
      {sel.length>0&&(
        <div style={{padding:"14px 20px",borderTop:"1px solid #111"}}>
          <button onClick={()=>onStart(sel)} style={{width:"100%",background:user.accent,color:"#000",border:"none",borderRadius:12,padding:16,fontSize:15,fontWeight:800,cursor:"pointer"}}>
            Empezar — {sel.length} rutina{sel.length>1?"s":""}
          </button>
        </div>
      )}
    </div>
  );
}

// ─── LOGIN ────────────────────────────────────────────────────────────────────
function Login({onLogin}){
  const [who,setWho]=useState(null);
  const [pin,setPin]=useState("");
  const [err,setErr]=useState(false);
  function tap(k){
    if(k==="⌫"){setPin(p=>p.slice(0,-1));setErr(false);return;}
    if(pin.length>=4) return;
    const np=pin+k;setPin(np);
    if(np.length===4){
      const u=USERS.find(u=>u.id===who);
      if(np===u.pin){setTimeout(()=>onLogin(u),150);}
      else{setTimeout(()=>{setErr(true);setPin("");},200);}
    }
  }
  return(
    <div style={{minHeight:"100vh",background:"#060606",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{marginBottom:48,textAlign:"center"}}>
        <div style={{fontSize:52,marginBottom:12}}>🏋️</div>
        <h1 style={{color:"#fff",fontSize:34,fontWeight:800,letterSpacing:-2}}>GymLog Pro</h1>
        <p style={{color:"#444",fontSize:11,marginTop:8,letterSpacing:3}}>REGISTRA TU PROGRESO</p>
      </div>
      {!who?(
        <div style={{display:"flex",flexDirection:"column",gap:12,width:"100%",maxWidth:320}}>
          {USERS.map(u=>(
            <button key={u.id} onClick={()=>{setWho(u.id);setPin("");setErr(false);}} style={{background:"#0e0e0e",border:"1.5px solid #1e1e1e",borderRadius:16,padding:"20px 24px",color:"#fff",cursor:"pointer",display:"flex",alignItems:"center",gap:16,width:"100%",transition:"border-color .2s"}}
              onMouseOver={e=>e.currentTarget.style.borderColor=u.accent}
              onMouseOut={e=>e.currentTarget.style.borderColor="#1e1e1e"}>
              <div style={{width:46,height:46,borderRadius:"50%",background:u.accent+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,flexShrink:0}}>{u.emoji}</div>
              <div style={{textAlign:"left"}}>
                <div style={{fontWeight:700,fontSize:17,color:"#fff"}}>{u.name}</div>
                <div style={{fontSize:11,color:"#444",marginTop:2,letterSpacing:1,fontFamily:"JetBrains Mono"}}>INGRESAR</div>
              </div>
              <span style={{marginLeft:"auto",color:"#333"}}>→</span>
            </button>
          ))}
        </div>
      ):(
        <div style={{width:"100%",maxWidth:300}}>
          <button onClick={()=>setWho(null)} style={{background:"none",border:"none",color:"#555",cursor:"pointer",marginBottom:24,fontSize:13}}>← Volver</button>
          <div style={{display:"flex",justifyContent:"center",gap:14,marginBottom:28}}>
            {[0,1,2,3].map(i=>(
              <div key={i} style={{width:14,height:14,borderRadius:"50%",background:pin.length>i?(err?"#ff4444":USERS.find(u=>u.id===who)?.accent):"#222",transition:"background .15s"}}/>
            ))}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
            {["1","2","3","4","5","6","7","8","9","","0","⌫"].map((k,i)=>(
              <button key={i} onClick={()=>k&&tap(k)} style={{background:k?"#111":"transparent",border:k?"1px solid #1e1e1e":"none",borderRadius:12,padding:"18px 0",fontSize:k==="⌫"?20:22,fontWeight:600,color:"#fff",cursor:k?"pointer":"default",fontFamily:"JetBrains Mono,monospace"}}>{k}</button>
            ))}
          </div>
          {err&&<p style={{color:"#ff4444",textAlign:"center",fontSize:12,marginTop:16}}>PIN incorrecto</p>}
        </div>
      )}
    </div>
  );
}

// ─── ROOT APP ─────────────────────────────────────────────────────────────────
const TABS=[
  {id:"home",label:"Hoy",icon:"🏠"},
  {id:"routines",label:"Rutinas",icon:"📋"},
  {id:"historial",label:"Historial",icon:"📊"},
  {id:"perfil",label:"Perfil",icon:"👤"},
];

function Wrap({children}){
  return <div style={{maxWidth:430,margin:"0 auto",height:"100vh",display:"flex",flexDirection:"column",background:"#060606",overflow:"hidden"}}>{children}</div>;
}

function App(){
  const [data,setData]=useState(loadAll);
  const [user,setUser]=useState(null);
  const [tab,setTab]=useState("home");
  const [overlay,setOverlay]=useState(null);

  // auto-save on every change
  useEffect(()=>{persist(data);},[data]);

  function setUD(newUd){
    setData(prev=>{
      const next={...prev,[user.id]:newUd};
      persist(next);
      return next;
    });
  }

  if(!user) return <Login onLogin={u=>{setUser(u);setTab("home");}}/>;

  const ud=data[user.id];

  if(overlay?.type==="session"){
    const sel=ud.routines.filter(r=>overlay.ids.includes(r.id));
    return(
      <Wrap>
        <SessionScreen routines={sel} user={user} sessions={ud.sessions||[]}
          onFinish={({session,updatedRoutines})=>{
            setUD({
              ...ud,
              routines:ud.routines.map(r=>{const u=updatedRoutines.find(x=>x.id===r.id);return u||r;}),
              sessions:[session,...(ud.sessions||[])],
            });
            setOverlay(null);setTab("home");
          }}
          onCancel={()=>setOverlay(null)}/>
      </Wrap>
    );
  }
  if(overlay?.type==="add"){
    return(
      <Wrap>
        <RoutineEditor accent={user.accent}
          onSave={r=>{setUD({...ud,routines:[...ud.routines,{id:uid(),...r}]});setOverlay(null);setTab("routines");}}
          onBack={()=>setOverlay(null)}/>
      </Wrap>
    );
  }
  if(overlay?.type==="edit"){
    return(
      <Wrap>
        <RoutineEditor existing={overlay.routine} accent={user.accent}
          onSave={r=>{setUD({...ud,routines:ud.routines.map(x=>x.id===overlay.routine.id?{...x,...r}:x)});setOverlay(null);setTab("routines");}}
          onBack={()=>setOverlay(null)}/>
      </Wrap>
    );
  }

  return(
    <Wrap>
      <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
        {tab==="home"&&<HomeScreen ud={ud} user={user} onStart={ids=>setOverlay({type:"session",ids})}/>}
        {tab==="routines"&&<RoutinesScreen ud={ud} user={user} onUpdate={setUD}
          goEdit={r=>setOverlay({type:"edit",routine:r})} goAdd={()=>setOverlay({type:"add"})}/>}
        {tab==="historial"&&<HistorialScreen ud={ud} user={user}/>}
        {tab==="perfil"&&<ProfileScreen user={user} data={data}
          onImport={d=>{setData(d);persist(d);}} onLogout={()=>setUser(null)}/>}
      </div>
      <nav style={{display:"flex",background:"#080808",borderTop:"1px solid #111",paddingBottom:"env(safe-area-inset-bottom,0px)"}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,background:"none",border:"none",cursor:"pointer",padding:"11px 0 13px",color:tab===t.id?user.accent:"#3a3a3a",fontFamily:"Syne,sans-serif",fontSize:10,letterSpacing:0.5,fontWeight:tab===t.id?700:400,display:"flex",flexDirection:"column",alignItems:"center",gap:3,transition:"color .15s"}}>
            <span style={{fontSize:18}}>{t.icon}</span>
            {t.label.toUpperCase()}
          </button>
        ))}
      </nav>
    </Wrap>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
